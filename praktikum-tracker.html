<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#9d6fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Praktikum">
<title>Praktikum Tracker</title>
<style>
:root{
  --bg:#0d0a14;--bg-card:#161220;--bg-hover:#1b1626;--bg-el:#211c30;
  --border:#2a2438;--border-s:#221d2e;
  --accent:#9d6fff;--accent2:#c9a8ff;--glow:rgba(157,111,255,.22);
  --text:#ece7f7;--dim:#9a90b3;--faint:#5e5575;--danger:#f1666e;
  --s0:#5b5470;--s1:#6c93ff;--s2:#34c9c0;--s3:#f5b94e;--s4:#4fd693;--s5:#f1666e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at 15% -10%,rgba(157,111,255,.10),transparent 45%),
             radial-gradient(circle at 100% 0%,rgba(108,147,255,.06),transparent 40%),var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;background:rgba(7,5,12,.97);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.ob-box{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;width:100%;max-width:520px;}
.ob-head{padding:24px 24px 0;}
.ob-head h1{font-size:22px;font-weight:700;margin-bottom:4px;}
.ob-head p{color:var(--dim);font-size:13px;}
.ob-steps{display:flex;gap:5px;padding:14px 24px 0;}
.ob-step{height:3px;border-radius:99px;flex:1;background:var(--border);transition:background .3s;}
.ob-step.done{background:var(--accent);}
.ob-body{padding:20px 24px 24px;}
.ob-body h2{font-size:15px;font-weight:650;margin-bottom:14px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.lang-opt{border:1px solid var(--border);background:var(--bg-el);border-radius:10px;
  padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.lang-opt:hover{border-color:var(--accent);}
.lang-opt.sel{background:var(--glow);border-color:var(--accent);color:var(--accent2);}
.lang-opt .flag{font-size:24px;display:block;margin-bottom:5px;}
.lang-opt .lname{font-size:12px;font-weight:600;}
.ob-instr{background:var(--bg-el);border:1px solid var(--border-s);border-radius:10px;
  padding:14px;margin-bottom:12px;font-size:13px;line-height:1.8;color:var(--dim);}
.ob-instr b{color:var(--text);}
.ob-instr a{color:var(--accent2);text-decoration:none;}
.ob-instr ol{padding-left:18px;}
.ob-field{display:flex;gap:8px;margin-bottom:6px;}
.ob-field input{flex:1;background:var(--bg-el);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:10px 12px;border-radius:9px;outline:none;font-family:monospace;}
.ob-field input:focus{border-color:var(--accent);}
.ob-err{font-size:11px;color:var(--danger);min-height:16px;margin-bottom:4px;}
.ob-info{font-size:12px;color:var(--s4);min-height:16px;margin-bottom:4px;}
.ob-skip{font-size:12px;color:var(--faint);text-align:center;margin:8px 0 0;cursor:pointer;}
.ob-skip:hover{color:var(--dim);}
.ob-opt-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;
  background:rgba(157,111,255,.15);color:var(--accent2);border-radius:5px;padding:2px 7px;margin-left:8px;}
.ob-success{background:rgba(79,214,147,.1);border:1px solid rgba(79,214,147,.25);border-radius:10px;
  padding:14px;margin-bottom:12px;font-size:13px;color:var(--s4);}
.ob-success b{display:block;margin-bottom:4px;font-size:14px;}
.ob-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:13px;padding:9px 14px;border-radius:9px;cursor:pointer;}
.btn-back:hover{color:var(--text);}
.btn-next{background:var(--accent);border:none;color:#140c24;font-weight:700;
  font-size:13px;padding:9px 20px;border-radius:9px;cursor:pointer;}
.btn-next:hover{filter:brightness(1.08);}
.btn-next:disabled{opacity:.4;cursor:default;}

/* MAIN APP */
.app{max-width:960px;margin:0 auto;padding:22px 16px 80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.brand-mark{width:34px;height:34px;border-radius:9px;flex:none;
  background:linear-gradient(145deg,var(--accent),#5a3bb8);position:relative;}
.brand-mark::after{content:"";position:absolute;inset:10px;border-radius:3px;background:var(--bg);opacity:.9;}
.brand-text h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
.dot{color:var(--accent);}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--s0);transition:background .3s;}
.sync-dot.ok{background:var(--s4);}
.sync-dot.spin{background:var(--s3);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.subtitle{font-size:11px;color:var(--dim);}
.topbar-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:12px;padding:7px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);}
.btn-ghost.al{border-color:var(--accent);color:var(--accent2);}
.btn-add{background:var(--accent);color:#140c24;border:none;font-weight:700;
  font-size:13px;padding:8px 14px;border-radius:9px;cursor:pointer;}
.btn-add:hover{filter:brightness(1.08);}

/* info bars */
.bar{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg-card);border:1px solid var(--border-s);border-radius:10px;margin-bottom:10px;flex-wrap:wrap;}
.bar[hidden]{display:none;}
.bar-dot{width:7px;height:7px;border-radius:50%;flex:none;background:var(--s0);}
.bar-dot.ok{background:var(--s4);}
.bar-dot.spin{background:var(--s3);animation:pulse 1s infinite;}
.bar-dot.err{background:var(--danger);}
.bar-text{font-size:12px;color:var(--dim);flex:1;}
.bar-text b{color:var(--text);}
.bar-text.err{color:var(--danger);}
.bar-btn{font-size:11px;padding:5px 9px;}

/* progress */
.prog-wrap{margin-bottom:16px;}
.prog-cap{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px;}
.prog-cap b{color:var(--text);}
.prog-track{display:flex;height:6px;border-radius:99px;overflow:hidden;background:var(--bg-el);border:1px solid var(--border-s);}
.prog-seg{height:100%;transition:width .3s;}

/* filters */
.frow{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:6px;margin-bottom:8px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.chip{border:1px solid var(--border);background:var(--bg-card);color:var(--dim);
  font-size:12px;padding:5px 10px;border-radius:99px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.chip:hover{border-color:var(--accent);}
.chip.active{background:var(--glow);border-color:var(--accent);color:var(--accent2);}
.chip.pA.active{background:rgba(245,185,78,.18);border-color:var(--s3);color:var(--s3);}
.chip.pB.active{background:rgba(108,147,255,.18);border-color:var(--s1);color:var(--s1);}
.chip.pC.active{border-color:var(--dim);color:var(--dim);}
.chip.pN.active{border-color:var(--faint);color:var(--faint);}
.chip.pX.active{background:rgba(241,102,110,.12);border-color:var(--danger);color:var(--danger);}
.search-inp{flex:1;min-width:120px;background:var(--bg-card);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:7px 11px;border-radius:9px;outline:none;}
.search-inp:focus{border-color:var(--accent);}
.search-row{display:flex;gap:6px;margin-bottom:10px;}

/* cards */
.list{display:flex;flex-direction:column;gap:7px;}
.card{background:var(--bg-card);border:1px solid var(--border-s);border-left:3px solid var(--c,var(--s0));border-radius:12px;overflow:hidden;}
.card:hover{background:var(--bg-hover);}
.card-main{display:flex;align-items:center;gap:7px;padding:11px 12px;flex-wrap:wrap;}
.card-info{flex:1;min-width:0;}
.card-info h3{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.slbl{font-size:11px;font-weight:700;color:var(--c,var(--s0));}
.dlbl{font-size:11px;color:var(--faint);}
.ptag{font-size:10px;font-weight:600;color:var(--accent2);background:rgba(157,111,255,.12);padding:1px 5px;border-radius:4px;}
.pbadge{display:inline-flex;align-items:center;justify-content:center;
  width:19px;height:19px;border-radius:5px;font-size:10px;font-weight:800;flex:none;}
.pbadge.A{background:rgba(245,185,78,.18);color:var(--s3);}
.pbadge.B{background:rgba(108,147,255,.18);color:var(--s1);}
.pbadge.C{background:rgba(255,255,255,.06);color:var(--faint);}
.npos{font-size:10px;color:var(--danger);background:rgba(241,102,110,.1);
  border:1px solid rgba(241,102,110,.2);border-radius:4px;padding:1px 5px;margin-left:3px;}

/* Deadline & date badges */
.dl-badge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;white-space:nowrap;}
.dl-urgent{color:#fff;background:var(--danger);}
.dl-soon{color:#140c24;background:var(--s3);}
.dl-far{color:var(--dim);background:var(--bg-el);border:1px solid var(--border);}
.dl-passed{color:var(--danger);text-decoration:line-through;font-size:10px;}
.open-badge{font-size:10px;color:var(--s2);background:rgba(52,201,192,.1);
  border:1px solid rgba(52,201,192,.2);border-radius:5px;padding:2px 6px;white-space:nowrap;}
.sent-ago{font-size:11px;color:var(--faint);}
.sent-ago.followup{color:var(--s3);font-weight:600;}
.ai-date-badge{font-size:10px;color:var(--s3);background:rgba(245,185,78,.1);
  border:1px solid rgba(245,185,78,.25);border-radius:4px;padding:1px 5px;}

/* Sort row */
.sort-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.sort-row span{font-size:11px;color:var(--faint);flex-shrink:0;}
.sort-chip{border:1px solid var(--border);background:var(--bg-card);color:var(--dim);
  font-size:11px;padding:5px 9px;border-radius:99px;cursor:pointer;white-space:nowrap;}
.sort-chip:hover{border-color:var(--accent);}
.sort-chip.active{background:var(--bg-el);border-color:var(--accent2);color:var(--accent2);}
select.ssel{background:var(--bg-el);border:1px solid var(--border);color:var(--text);
  font-size:12px;padding:6px 7px;border-radius:7px;outline:none;cursor:pointer;max-width:120px;flex-shrink:0;}
.ibtn{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:12px;padding:6px 8px;border-radius:7px;cursor:pointer;flex-shrink:0;}
.ibtn:hover{color:var(--text);border-color:var(--accent);}
.ibtn.del:hover{color:var(--danger);border-color:var(--danger);}

/* detail */
.detail{border-top:1px solid var(--border-s);padding:14px;background:rgba(255,255,255,.012);}
.det-links{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.det-links a{color:var(--accent2);text-decoration:none;font-size:12px;
  border:1px solid var(--border);padding:5px 8px;border-radius:7px;background:var(--bg-el);}
.det-links a:hover{border-color:var(--accent);}
.det-links .muted{color:var(--faint);font-size:12px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;margin-bottom:8px;}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;}
.field input,.field textarea,.field select{width:100%;background:var(--bg-el);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:8px 9px;border-radius:7px;outline:none;font-family:inherit;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:50px;}
.det-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;}
.ai-row{display:flex;align-items:center;gap:8px;margin:10px 0 3px;}
.btn-ai{background:var(--bg-el);border:1px solid var(--accent);color:var(--accent2);
  font-size:12px;font-weight:600;padding:7px 11px;border-radius:8px;cursor:pointer;}
.btn-ai:hover{background:var(--glow);}
.btn-ai:disabled{opacity:.4;cursor:default;}
.ai-st{font-size:12px;min-height:14px;margin:5px 0;}
.ai-st.loading{color:var(--dim);}
.ai-st.ok{color:var(--s4);}
.ai-st.err{color:var(--danger);}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(7,5,12,.75);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:4vh 14px;z-index:50;overflow-y:auto;}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;padding:20px;}
.modal h2{font-size:16px;margin-bottom:14px;}
.m-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.btn-prim{background:var(--accent);border:none;color:#140c24;font-weight:700;font-size:13px;padding:9px 18px;border-radius:9px;cursor:pointer;}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:13px;padding:9px 13px;border-radius:9px;cursor:pointer;}
.btn-prim:hover{filter:brightness(1.08);}
.btn-sec:hover{color:var(--text);border-color:var(--accent);}

/* settings */
.set-sec{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;margin:16px 0 8px;}
.set-sec:first-child{margin-top:0;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-s);}
.set-row:last-child{border-bottom:none;}
.set-lbl{font-size:13px;color:var(--dim);flex:1;min-width:0;}
.set-lbl b{color:var(--text);display:block;font-size:12px;margin-bottom:1px;}
.set-lbl small{font-size:11px;color:var(--faint);}
.set-btns{display:flex;gap:5px;flex-shrink:0;}

.empty{text-align:center;color:var(--faint);padding:50px 20px;font-size:13px;border:1px dashed var(--border);border-radius:14px;}

/* Discovery panel */
.disc-panel{background:var(--bg-card);border:1px solid var(--accent);border-radius:14px;
  margin-bottom:16px;overflow:hidden;
  box-shadow:0 0 0 1px var(--glow),0 8px 32px -8px rgba(157,111,255,.2);}
.disc-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  border-bottom:1px solid var(--border-s);}
.disc-head h3{font-size:14px;font-weight:650;color:var(--accent2);display:flex;align-items:center;gap:7px;}
.disc-inputs{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;padding:14px 16px;border-bottom:1px solid var(--border-s);}
@media(max-width:560px){.disc-inputs{grid-template-columns:1fr;}}
.disc-inp{background:var(--bg-el);border:1px solid var(--border);color:var(--text);
  font-size:13px;padding:8px 10px;border-radius:8px;outline:none;font-family:inherit;}
.disc-inp:focus{border-color:var(--accent);}
.btn-disc-search{background:var(--accent);border:none;color:#140c24;font-weight:700;
  font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.btn-disc-search:hover{filter:brightness(1.08);}
.btn-disc-search:disabled{opacity:.4;cursor:default;}
.disc-results{padding:0 12px;}
.disc-card{background:var(--bg-el);border:1px solid var(--border-s);border-radius:10px;
  padding:13px;margin:10px 0;display:flex;gap:12px;align-items:flex-start;}
.disc-card-info{flex:1;min-width:0;}
.disc-card-info h4{font-size:13px;font-weight:650;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.disc-card-info p{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:4px;}
.disc-card-info small{font-size:11px;color:var(--faint);}
.disc-card-info small span{margin-right:10px;}
.btn-disc-add{background:var(--glow);border:1px solid var(--accent);color:var(--accent2);
  font-size:12px;font-weight:650;padding:7px 11px;border-radius:8px;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:background .15s;}
.btn-disc-add:hover{background:var(--accent);color:#140c24;}
.btn-disc-add.added{background:rgba(79,214,147,.15);border-color:var(--s4);color:var(--s4);cursor:default;}
.disc-footer{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.disc-status{font-size:12px;color:var(--dim);flex:1;}
.disc-status.err{color:var(--danger);}
.disc-status.ok{color:var(--s4);}
.btn-disc-more{background:var(--bg-el);border:1px solid var(--border);color:var(--dim);
  font-size:12px;padding:7px 13px;border-radius:8px;cursor:pointer;}
.btn-disc-more:hover{color:var(--text);border-color:var(--accent);}
footer.note{text-align:center;color:var(--faint);font-size:11px;margin-top:26px;line-height:1.6;}

@media(max-width:600px){
  .app{padding:14px 12px 70px;}
  .fgrid{grid-template-columns:1fr;}
  select.ssel{max-width:none;width:100%;order:5;flex-basis:100%;}
  .card-main{gap:6px;}
  .modal{padding:16px;}
  .ob-body{padding:16px 18px 20px;}
}
@media(max-width:400px){
  .subtitle{display:none;}
  .topbar-right .lbtn{display:none;}
}
[hidden]{display:none!important;}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-box">
    <div class="ob-head">
      <h1>Praktikum<span style="color:var(--accent)">.</span></h1>
      <p id="obSub"></p>
    </div>
    <div class="ob-steps">
      <div class="ob-step" id="obs0"></div>
      <div class="ob-step" id="obs1"></div>
      <div class="ob-step" id="obs2"></div>
      <div class="ob-step" id="obs3"></div>
    </div>
    <div class="ob-body" id="obBody"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" hidden>
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <h1>Praktikum<span class="dot">.</span> <span class="sync-dot" id="syncDot"></span></h1>
        <p class="subtitle" id="appSub"></p>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost lbtn" data-l="de">DE</button>
      <button class="btn-ghost lbtn" data-l="ru">RU</button>
      <button class="btn-ghost lbtn" data-l="en">EN</button>
      <button class="btn-ghost" id="btnSettings">⚙</button>
      <button class="btn-ghost" id="btnDiscover" style="color:var(--accent2);border-color:var(--accent);"></button>
      <button class="btn-ghost" id="btnExport"></button>
      <button class="btn-ghost" id="btnImport"></button>
      <input type="file" id="importFile" accept="application/json" hidden>
      <button class="btn-add" id="btnAdd"></button>
    </div>
  </div>

  <!-- Sync bar -->
  <div class="bar" id="syncBar" hidden>
    <span class="bar-dot" id="syncBarDot"></span>
    <span class="bar-text" id="syncBarText"></span>
    <button class="btn-ghost bar-btn" id="syncBarBtn" hidden></button>
  </div>

  <!-- Autosave bar -->
  <div class="bar" id="asBar">
    <span class="bar-dot" id="asDot"></span>
    <span class="bar-text" id="asText"></span>
    <button class="btn-ghost bar-btn" id="asBtn" hidden></button>
    <button class="btn-ghost bar-btn" id="asDisBtn" hidden></button>
  </div>

  <!-- RL bar -->
  <div class="bar" id="rlBar" hidden>
    <span style="font-size:13px;flex:none;">⚡</span>
    <span class="bar-text" id="rlText"></span>
  </div>

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-cap"><span><b id="sentN">0</b> <span id="sentLbl"></span></span><span id="pctLbl">0%</span></div>
    <div class="prog-track" id="progTrack"></div>
  </div>

  <div class="frow" id="filterRow"></div>
  <div class="frow" id="prioRow"></div>

// ── Date helpers ─────────────────────────────────────────
function daysDiff(isoDate){
  if(!isoDate)return null;
  const d=new Date(isoDate),now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.round((d-now)/(1000*60*60*24));
}
function dlBadgeHtml(isoDate){
  if(!isoDate)return"";
  const d=daysDiff(isoDate);
  if(d===null)return"";
  if(d<0)return`<span class="dl-badge dl-passed">${t("dlPassed")}</span>`;
  if(d<=3)return`<span class="dl-badge dl-urgent">${t("dlUrgent",{d})}</span>`;
  if(d<=14)return`<span class="dl-badge dl-soon">${t("dlSoon",{d})}</span>`;
  return`<span class="dl-badge dl-far">${t("dlFar",{d})}</span>`;
}
function openBadgeHtml(isoDate){
  if(!isoDate)return"";
  const d=daysDiff(isoDate);
  if(d===null)return"";
  if(d>30)return""; // too far in future, not relevant yet
  if(d>0)return`<span class="open-badge">${t("openSoon",{d})}</span>`;
  if(d===0)return`<span class="open-badge">${t("openToday")}</span>`;
  // Already open (d < 0) — show for up to 60 days
  if(d>=-60)return`<span class="open-badge">${t("openPassed",{d:Math.abs(d)})}</span>`;
  return"";
}
function sentAgoBadge(c){
  if(!c.sentDate||c.status==="not_sent")return"";
  const d=daysDiff(c.sentDate);
  if(d===null)return"";
  const daysSent=Math.abs(d);
  const needFollowup=daysSent>=14&&(c.status==="sent");
  if(daysSent===0)return`<span class="sent-ago">${t("sentToday")}</span>`;
  const cls=needFollowup?"sent-ago followup":"sent-ago";
  const label=t("sentAgo",{d:daysSent});
  return`<span class="${cls}">${label}${needFollowup?" "+t("followUp"):""}</span>`;
}

function utc(ms){if(!ms)return"?";return new Date(ms).toUTCString().slice(-12,-4);}
function updRl(h){const l=parseInt(h.get("x-ratelimit-limit-requests")||"0")||0,r=parseInt(h.get("x-ratelimit-remaining-requests")||"0")||0,raw=h.get("x-ratelimit-reset-requests")||"";if(l||r){rlCache={l,r,resetAt:Date.now()+pReset(raw)};localStorage.setItem(SK_RL,JSON.stringify(rlCache));}renderRl();}
function dayLimitHit(){const{r,l,resetAt}=rlCache;return!!(l&&r===0&&resetAt&&Date.now()<resetAt);}

}

// ── GitHub Gist Sync ──────────────────────────────────────
async function ghFetch(method,path,body){
  const r=await fetch("https://api.github.com/"+path,{method,
    headers:{"Authorization":"token "+ghPat,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},
    body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text().catch(()=>"");throw Object.assign(new Error(e.slice(0,100)),{status:r.status});}
  return r.json();
}

// Gist payload always includes groqKey so the key syncs too
function buildGistPayload(){return{updatedAt:Date.now(),groqKey,companies};}

async function pushGist(){
  if(!ghPat||!gistId)return;
  try{
    setSyncState("spin");
    await ghFetch("PATCH","gists/"+gistId,{files:{[GF]:{content:JSON.stringify(buildGistPayload())}}});
    syncTs=Date.now();localStorage.setItem(SK_STS,syncTs);
    setSyncState("ok");renderSyncBar();
  }catch(e){setSyncState("err",e.message);}
}

async function pullGist(){
  if(!ghPat||!gistId)return;
  try{
    setSyncState("spin");
    const data=await ghFetch("GET","gists/"+gistId);
    const raw=data.files?.[GF]?.content;if(!raw)throw new Error("no file");
    const p=JSON.parse(raw);
    // Always update groqKey from gist (keeps keys in sync across devices)
    if(p.groqKey&&p.groqKey!==groqKey){groqKey=p.groqKey;localStorage.setItem(SK_GROQ,groqKey);}
    if(p.updatedAt>syncTs||companies.length===0){
      companies=p.companies||[];localStorage.setItem(SK,JSON.stringify(companies));
      syncTs=p.updatedAt;localStorage.setItem(SK_STS,syncTs);render();
    }
    setSyncState("ok");renderSyncBar();
  }catch(e){setSyncState("err",e.message);}
}

// Returns {groqKey} from existing gist or null
async function findExistingGist(pat){
  const tmp=ghPat;ghPat=pat;
  try{
    const gists=await ghFetch("GET","gists");
    const found=gists.find(g=>g.files&&g.files[GF]);
    if(!found){ghPat=tmp;return null;}
    gistId=found.id;localStorage.setItem(SK_GIST,gistId);
    const full=await ghFetch("GET","gists/"+gistId);
    const raw=full.files?.[GF]?.content;
    const p=raw?JSON.parse(raw):{};
    return{groqKey:p.groqKey||"",companies:p.companies||[]};
  }catch(e){ghPat=tmp;throw e;}
}

async function connectGist(pat){
  ghPat=pat;localStorage.setItem(SK_PAT,ghPat);
  setSyncState("spin");
  try{
    const found=await findExistingGist(pat);
    if(found){
      if(found.groqKey){groqKey=found.groqKey;localStorage.setItem(SK_GROQ,groqKey);}
      if(found.companies.length>0){companies=found.companies;localStorage.setItem(SK,JSON.stringify(companies));}
      syncTs=Date.now();localStorage.setItem(SK_STS,syncTs);
    }else{
      // Create new gist with current data
      const created=await ghFetch("POST","gists",{description:"Praktikum Tracker Sync",public:false,files:{[GF]:{content:JSON.stringify(buildGistPayload())}}});
      gistId=created.id;localStorage.setItem(SK_GIST,gistId);
      syncTs=Date.now();localStorage.setItem(SK_STS,syncTs);
    }
    setSyncState("ok");renderSyncBar();renderSettings();
    return{groqKey};
  }catch(e){
    setSyncState("err",e.status===401?t("syncEPat"):e.message);
    ghPat="";gistId="";localStorage.removeItem(SK_PAT);localStorage.removeItem(SK_GIST);
    throw e;
  }
}

function disconnectGist(){
  ghPat="";gistId="";syncTs=0;
  localStorage.removeItem(SK_PAT);localStorage.removeItem(SK_GIST);localStorage.removeItem(SK_STS);
  setSyncState("none");renderSyncBar();renderSettings();
}

function renderSyncBar(){
  const bar=document.getElementById("syncBar"),dot=document.getElementById("syncBarDot");

  if(syncState==="none"||!ghPat){bar.hidden=true;return;}

  else if(syncState==="spin"){txt.textContent=t("syncing");btn.hidden=true;}
  else{txt.className="bar-text err";txt.textContent=t("syncE");btn.hidden=false;btn.textContent=t("syncNowBtn");}
}

function bPrompt(name,prof,loc){
  const p=prof?` Student seeks "${prof}" internship.`:"";
  const l=loc?` Focus on location: "${loc}", Austria.`:"";
  return{
    sys:`Data lookup for Austrian HTL student Ferialpraktikum.${p}${l} Find: website, phone, HR email, contact person name+role, Austrian office address. Reply ONLY valid JSON no markdown: {"website":"","phone":"","email":"","contactName":"","contactRole":"","address":"","notes":""}. Empty if unknown. Never invent.`,
    usr:`Company: "${name}", Austria.${prof?` "${prof}" internship contact.`:""}${loc?` In/near: "${loc}".`:""}`
  };
}
async function callGroq(mid,name,prof,loc){
  const{sys,usr}=bPrompt(name,prof,loc);
  const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
    body:JSON.stringify({model:mid,messages:[{role:"system",content:sys},{role:"user",content:usr}],temperature:.1,max_completion_tokens:280})});
  try{updRl(r.headers);}catch(e){}
  if(!r.ok){const e=await r.text().catch(()=>"");throw Object.assign(new Error(e.slice(0,120)),{status:r.status});}
  const d=await r.json();const raw=d.choices?.[0]?.message?.content||"";
  const m=raw.match(/\{[\s\S]*?\}/);if(!m)throw new Error("bad json");
  return JSON.parse(m[0]);
}
function aiErr(e){
  const s=e.status,m=e.message||"";
  if(s===429||m.includes("429"))return t("aiE429",{r:utc(rlCache.resetAt)});
  if(s===401||s===403)return t("aiEKey");
  if(m.includes("Failed to fetch")||m.includes("NetworkError"))return t("aiENet");
  return t("aiEGen",{m:m.slice(0,60)});
}
async function aiFill(name,prof,loc){
  if(dayLimitHit())throw Object.assign(new Error("limit"),{status:429});
  let last;
  for(const m of MODELS){try{return{r:await callGroq(m.id,name,prof,loc),s:m.s};}catch(e){last=e;if(e.status===401||e.status===403||e.status===429)throw e;}}
  throw last;
}
async function runAi(stEl,btn,name,prof,loc,apFn){
  if(!name.trim()){stEl.className="ai-st err";stEl.textContent="—";return;}
  btn.disabled=true;stEl.className="ai-st loading";stEl.textContent=t("aiLoad");
  try{const{r,s}=await aiFill(name.trim(),prof,loc||"");apFn(r);stEl.className="ai-st ok";stEl.textContent=s?t("aiOk"):t("aiOkN");}
  catch(e){stEl.className="ai-st err";stEl.textContent=aiErr(e);renderRl();}
  finally{btn.disabled=false;}
}

async function idbGet(k){const db=await openIdb();return new Promise((r,j)=>{const tx=db.transaction(HST,"readonly");const q=tx.objectStore(HST).get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});}
async function idbDel(k){const db=await openIdb();return new Promise((r,j)=>{const tx=db.transaction(HST,"readwrite");tx.objectStore(HST).delete(k);tx.oncomplete=r;tx.onerror=()=>j(tx.error);});}

const PO={"A":0,"B":1,"C":2,"":3};
function getFiltered(){
  return companies.filter(c=>{
    if(activeFilter!=="all"&&c.status!==activeFilter)return false;
    if(searchTerm&&!c.name.toLowerCase().includes(searchTerm.toLowerCase()))return false;
    if(activePrios.size>0){
      const ok=(activePrios.has("A")&&c.priority==="A")||(activePrios.has("B")&&c.priority==="B")||(activePrios.has("C")&&c.priority==="C")||(activePrios.has("none")&&!c.priority)||(activePrios.has("nopos")&&c.noPosition);
      if(!ok)return false;
    }
    if(activeDateFilters.size>0){
      let dateOk=false;
      if(activeDateFilters.has("fdSoon")){const d=daysDiff(c.deadline);if(d!==null&&d>=0&&d<=7)dateOk=true;}
      if(activeDateFilters.has("fdMonth")){const d=daysDiff(c.deadline);if(d!==null&&d>=0&&d<=30)dateOk=true;}
      if(activeDateFilters.has("fdOpen")){const d=daysDiff(c.openDate);if(d!==null&&d>=0&&d<=14)dateOk=true;}
      if(activeDateFilters.has("fdFollowup")){const d=daysDiff(c.sentDate);if(c.status==="sent"&&d!==null&&Math.abs(d)>=14)dateOk=true;}
      if(!dateOk)return false;
    }
    return true;
  }).sort((a,b)=>{
    if(sortMode==="deadline"){
      const da=a.deadline?daysDiff(a.deadline):9999,db=b.deadline?daysDiff(b.deadline):9999;
      const ra=da===null?9999:da<0?9998:da,rb=db===null?9999:db<0?9998:db;
      return ra-rb||(PO[a.priority||""]??3)-(PO[b.priority||""]??3);
    }
    if(sortMode==="sent"){
      const da=a.sentDate?new Date(a.sentDate):new Date(9999,0),db=b.sentDate?new Date(b.sentDate):new Date(9999,0);
      return da-db;
    }
    if(sortMode==="name")return a.name.localeCompare(b.name);
    // default: priority
    return(PO[a.priority||""]??3)-(PO[b.priority||""]??3);
  });
}

function addC(d){companies.unshift({id:uid(),name:d.name,status:"not_sent",sentDate:"",
  profession:d.profession||"",priority:d.priority||"",noPosition:false,
  openDate:"",deadline:"",datesFromAi:false,datesConfirmed:false,
  website:d.website||"",phone:d.phone||"",contactName:d.contactName||"",
  contactRole:d.contactRole||"",email:d.email||"",address:d.address||"",notes:d.notes||""});saveC();render();}
function delC(id){if(!confirm(t("delQ")))return;companies=companies.filter(c=>c.id!==id);if(expandedId===id)expandedId=null;saveC();render();}
function setSt(id,status){const c=companies.find(c=>c.id===id);if(!c)return;c.status=status;if(status!=="not_sent"&&!c.sentDate)c.sentDate=today();saveC();render();}
function saveDet(id,card){
  const c=companies.find(c=>c.id===id);if(!c)return;
  const oldOpen=c.openDate,oldDl=c.deadline;
  card.querySelectorAll("[data-f]").forEach(el=>{
    if(el.type==="checkbox")c[el.dataset.f]=el.checked;
    else c[el.dataset.f]=el.value.trim();
  });
  // If user changed a date manually → mark as confirmed
  if((c.openDate!==oldOpen||c.deadline!==oldDl)&&c.datesFromAi){
    c.datesConfirmed=true;
  }
  saveC();render();
}

// ── Onboarding ────────────────────────────────────────────
let obStep=0,obLang=lang;

async function renderOb(){
  const L=I18N[obLang]||I18N.de;document.getElementById("obSub").textContent=ob("sub");
  [0,1,2,3].forEach(i=>document.getElementById("obs"+i).className="ob-step"+(i<=obStep?" done":""));
  const body=document.getElementById("obBody");

  if(obStep===0){
    body.innerHTML=`<h2>${ob("t0")}</h2>
    <div class="lang-grid">${["de","ru","en"].map(l=>`<div class="lang-opt${obLang===l?" sel":""}" data-ol="${l}"><span class="flag">${l==="de"?"🇦🇹":l==="ru"?"🇷🇺":"🇬🇧"}</span><span class="lname">${l==="de"?"Deutsch":l==="ru"?"Русский":"English"}</span></div>`).join("")}</div>
    <div class="ob-footer"><button class="btn-next" id="obNext">${ob("next")}</button></div>`;
    body.querySelectorAll("[data-ol]").forEach(el=>el.addEventListener("click",()=>{obLang=el.dataset.ol;renderOb();}));
    document.getElementById("obNext").addEventListener("click",()=>{obStep=1;renderOb();});
  }
  else if(obStep===1){
    // GitHub step (optional)
    const i1=(I18N[obLang]||I18N.de).ob.i1||[];
    body.innerHTML=`<h2>${ob("t1")} <span class="ob-opt-badge">optional</span></h2>
    <div class="ob-instr"><ol>${i1.map(s=>`<li>${s}</li>`).join("")}</ol></div>
    <div class="ob-field"><input type="text" id="obPat" placeholder="${ob("p1")}" autocomplete="off"></div>
    <div class="ob-err" id="obPatErr"></div>
    <div class="ob-info" id="obPatInfo"></div>
    <p class="ob-skip" id="obSkip">${ob("skip1")}</p>
    <div class="ob-footer">
      <button class="btn-back" id="obBack">${ob("back")}</button>
      <button class="btn-next" id="obNext">${ob("next")}</button>
    </div>`;
    document.getElementById("obBack").addEventListener("click",()=>{obStep=0;renderOb();});
    document.getElementById("obSkip").addEventListener("click",()=>{obStep=2;renderOb();});
    document.getElementById("obNext").addEventListener("click",async()=>{
      const v=document.getElementById("obPat").value.trim();
      if(!v){obStep=2;renderOb();return;}
      const errEl=document.getElementById("obPatErr"),infoEl=document.getElementById("obPatInfo");
      const btn=document.getElementById("obNext");btn.disabled=true;
      infoEl.textContent=t("syncing");
      try{
        const result=await connectGist(v);
        lang=obLang;localStorage.setItem(SK_LANG,lang);
        // If gist had a groqKey, skip step 2
        if(result&&result.groqKey&&groqKey){obStep=3;}else{obStep=2;}
        renderOb();
      }catch(e){errEl.textContent=e.message||t("syncEPat");btn.disabled=false;infoEl.textContent="";}
    });
  }
  else if(obStep===2){
    // Groq key step
    const i2=(I18N[obLang]||I18N.de).ob.i2||[];
    const autoLoaded=groqKey&&ghPat;
    body.innerHTML=`<h2>${ob("t2")}</h2>
    ${autoLoaded?`<div class="ob-success"><b>${ob("autoLoaded")}</b>${groqKey.slice(0,8)}…</div>`:`<div class="ob-instr"><ol>${i2.map(s=>`<li>${s}</li>`).join("")}</ol></div>`}
    ${!autoLoaded?`<div class="ob-field"><input type="text" id="obKey" placeholder="${ob("p2")}" autocomplete="off"></div><div class="ob-err" id="obKeyErr"></div>`:""}
    <div class="ob-footer">
      <button class="btn-back" id="obBack">${ob("back")}</button>
      <button class="btn-next" id="obNext">${ob("next")}</button>
    </div>`;
    document.getElementById("obBack").addEventListener("click",()=>{obStep=1;renderOb();});
    if(!autoLoaded){
      const inp=document.getElementById("obKey"),nxt=document.getElementById("obNext");
      nxt.disabled=true;
      inp.addEventListener("input",()=>{nxt.disabled=inp.value.trim().length<10;document.getElementById("obKeyErr").textContent="";});
      nxt.addEventListener("click",()=>{
        const v=inp.value.trim();if(v.length<10){document.getElementById("obKeyErr").textContent="Invalid";return;}
        groqKey=v;lang=obLang;localStorage.setItem(SK_GROQ,groqKey);localStorage.setItem(SK_LANG,lang);
        // If github connected, push key to gist
        if(ghPat&&gistId)pushGist();
        obStep=3;renderOb();
      });
    }else{
      document.getElementById("obNext").addEventListener("click",()=>{obStep=3;renderOb();});
    }
  }
  else{
    // Done
    const L2=(I18N[obLang]||I18N.de).ob;
    body.innerHTML=`<h2>${L2.t3}</h2>
    <div class="ob-instr">${L2.d3}</div>
    <div class="ob-footer"><button class="btn-next" id="obDone">${L2.done}</button></div>`;
    document.getElementById("obDone").addEventListener("click",()=>{
      document.getElementById("onboarding").hidden=true;
      document.getElementById("mainApp").hidden=false;
      initApp();
    });
  }
}

    addC({name,profession:document.getElementById("fProf").value.trim(),priority:document.getElementById("fPrio").value,

      contactName:document.getElementById("fCont").value.trim(),contactRole:document.getElementById("fRole").value.trim(),
      email:document.getElementById("fEmail").value.trim(),address:document.getElementById("fAddr").value.trim(),
      notes:document.getElementById("fNotes").value.trim()});closeAdd();
  });
  document.getElementById("aiFillBtn").addEventListener("click",()=>{
    const nm=document.getElementById("fName").value,pr=document.getElementById("fProf").value.trim();
    const loc=document.getElementById("fAiLoc").value.trim();

function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,.0,.12],[659,.13,.5],[784,.26,.7]].forEach(([freq,start,end])=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type="sine";osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,ctx.currentTime+start);
      gain.gain.linearRampToValueAtTime(.08,ctx.currentTime+start+.04);
      gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+end);
      osc.start(ctx.currentTime+start);osc.stop(ctx.currentTime+end);
    });
  }catch(e){}
}

// ── AI date finder ────────────────────────────────────────
async function findDatesAi(name, prof){
  const now=new Date();
  const nowStr=now.toISOString().slice(0,10);
  const year=now.getFullYear();
  const nextYear=year+1;
  const sys=`You are a research assistant. Find Austrian company Ferialpraktikum/internship application window dates.
Today is ${nowStr}. You MUST return only FUTURE or current dates (${nowStr} or later).
If a company has annual deadlines and the ${year} deadline has already passed, return the ${nextYear} date instead.
Return ONLY valid JSON no markdown: {"openDate":"YYYY-MM-DD","deadline":"YYYY-MM-DD","notes":"","confidence":"high|medium|low"}
Use empty string if genuinely not found or unknown. Never invent dates — if unsure use empty string.`;
  const usr=`Company: "${name}", Austria.${prof?` Profession: "${prof}".`:""} Find UPCOMING (future) dates: when applications OPEN (Bewerbungsstart) and the DEADLINE (Bewerbungsschluss/Einsendeschluss) for Ferialpraktikum/internship. Today: ${nowStr}.`;
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
    body:JSON.stringify({model:"compound-beta-mini",messages:[{role:"system",content:sys},{role:"user",content:usr}],temperature:.1,max_completion_tokens:200})
  });
  try{updRl(res.headers);}catch(e){}
  if(!res.ok){const e=await res.text().catch(()=>"");throw Object.assign(new Error(e.slice(0,100)),{status:res.status});}
  const d=await res.json();
  const raw=d.choices?.[0]?.message?.content||"";
  const m=raw.match(/\{[\s\S]*?\}/);if(!m)throw new Error("bad json");
  const result=JSON.parse(m[0]);
  // Post-process: if date is in the past, try shifting it one year forward
  function shiftIfPast(iso){
    if(!iso)return iso;
    const diff=daysDiff(iso);
    if(diff!==null&&diff<0){
      const shifted=new Date(iso);
      shifted.setFullYear(shifted.getFullYear()+1);
      return shifted.toISOString().slice(0,10);
    }
    return iso;
  }
  result.openDate=shiftIfPast(result.openDate);
  result.deadline=shiftIfPast(result.deadline);
  return result;
}
let discPage=0,discProf="",discLoc="",discAllResults=[];

function buildDiscPrompt(prof,loc,exclude,page){
  const excList=exclude.slice(0,30).join(", ")||"none";
  const variety=page>0?` Give ${page*5+1}-${page*5+5}th different results, not the first ones.`:"";
  return{
    sys:`You help an Austrian HTL student (age 16-18) find Ferialpraktikum (summer internship) companies in Austria. Return ONLY valid JSON array, no markdown, no extra text: [{"name":"","description":"","address":"","website":""}]. Max 1 sentence description. Real Austrian companies only. Never return companies from the excluded list.`,
    usr:`Find exactly 5 real companies offering "${prof}" internships in/near "${loc}", Austria. Exclude already contacted: [${excList}].${variety} Focus on companies reachable for a student in that area.`
  };
}

async function callGroqDisc(prof,loc,page){
  const exclude=companies.map(c=>c.name);
  const{sys,usr}=buildDiscPrompt(prof,loc,exclude,page);
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[{role:"system",content:sys},{role:"user",content:usr}],temperature:.7,max_completion_tokens:600})
  });
  try{updRl(res.headers);}catch(e){}
  if(!res.ok){const e=await res.text().catch(()=>"");throw Object.assign(new Error(e.slice(0,100)),{status:res.status});}
  const d=await res.json();
  const raw=d.choices?.[0]?.message?.content||"";
  const m=raw.match(/\[[\s\S]*\]/);
  if(!m)throw new Error("bad json");
  const arr=JSON.parse(m[0]);
  if(!Array.isArray(arr))throw new Error("not array");
  // Filter out already in list
  const existing=new Set(companies.map(c=>c.name.toLowerCase().trim()));
  return arr.filter(r=>r.name&&!existing.has(r.name.toLowerCase().trim()));
}

function discErrMsg(e){
  if(e.status===401||e.status===403)return t("discErrKey");
  if(e.message?.includes("Failed to fetch")||e.message?.includes("NetworkError"))return t("discErrNet");
  return t("discErrGen",{m:(e.message||"").slice(0,60)});
}

async function runDiscovery(loadMore=false){
  const profEl=document.getElementById("discProf"),locEl=document.getElementById("discLoc");
  const prof=profEl.value.trim(),loc=locEl.value.trim();
  if(!prof||!loc){
    document.getElementById("discStatus").className="disc-status err";
    document.getElementById("discStatus").textContent={"de":"Bitte Beruf und Ort angeben.","ru":"Укажи профессию и место.","en":"Please enter profession and location."}[lang]||"Enter profession and location.";
    document.getElementById("discFooter").hidden=false;
    return;
  }
  if(!loadMore){discPage=0;discAllResults=[];discProf=prof;discLoc=loc;}
  const btn=document.getElementById("discSearchBtn"),moreBtn=document.getElementById("discMoreBtn");
  btn.disabled=true;if(moreBtn)moreBtn.disabled=true;
  const statusEl=document.getElementById("discStatus");
  statusEl.className="disc-status";statusEl.textContent=t("discLoading");
  document.getElementById("discFooter").hidden=false;
  moreBtn.hidden=true;
  try{
    const results=await callGroqDisc(discProf,discLoc,discPage);
    if(!results.length&&!discAllResults.length){
      statusEl.className="disc-status";statusEl.textContent=t("discEmpty");
    }else{
      discAllResults=[...discAllResults,...results];
      discPage++;
      renderDiscResults();
      statusEl.className="disc-status ok";
      statusEl.textContent=t("discFound",{n:discAllResults.length});
      moreBtn.hidden=false;moreBtn.textContent=t("discMore");

  }catch(e){
    statusEl.className="disc-status err";statusEl.textContent=discErrMsg(e);
  }finally{
    btn.disabled=false;if(moreBtn)moreBtn.disabled=false;
  }
}

// ── PWA icon ──────────────────────────────────────────────
function generateIcon(size){
  const c=document.createElement("canvas");c.width=c.height=size;
  const x=c.getContext("2d"),r=size*.22;
  // Rounded background
  x.beginPath();
  if(x.roundRect)x.roundRect(0,0,size,size,r);
  else{x.moveTo(r,0);x.lineTo(size-r,0);x.quadraticCurveTo(size,0,size,r);x.lineTo(size,size-r);x.quadraticCurveTo(size,size,size-r,size);x.lineTo(r,size);x.quadraticCurveTo(0,size,0,size-r);x.lineTo(0,r);x.quadraticCurveTo(0,0,r,0);x.closePath();}
  const g=x.createLinearGradient(0,0,size,size);
  g.addColorStop(0,"#9d6fff");g.addColorStop(1,"#4a2a9a");
  x.fillStyle=g;x.fill();
  // Letter P
  x.fillStyle="#ece7f7";
  x.font=`bold ${size*.48}px -apple-system,BlinkMacSystemFont,sans-serif`;
  x.textAlign="center";x.textBaseline="middle";
  x.fillText("P",size*.44,size*.5);
  // Accent dot
  x.fillStyle="#c9a8ff";
  x.font=`bold ${size*.48}px sans-serif`;
  x.fillText(".",size*.72,size*.48);
  return c.toDataURL("image/png");
}

      start_url:"./",display:"standalone",
      background_color:"#0d0a14",theme_color:"#9d6fff",
      icons:[{src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    const mlink=document.createElement("link");mlink.rel="manifest";mlink.href=URL.createObjectURL(blob);document.head.appendChild(mlink);
  }catch(e){console.warn("PWA init failed:",e);}
}

// ── Init ─────────────────────────────────────────────────
function initApp(){
  loadC();loadRl();render();initAs();
  if(ghPat&&gistId){setSyncState("ok");renderSyncBar();pullGist();}
  else if(ghPat&&!gistId){connectGist(ghPat).catch(()=>{});}
  else{setSyncState("none");renderSyncBar();}
  wireEvents();
}

// Boot
initPWA();
if(!groqKey){renderOb();}
else{document.getElementById("onboarding").hidden=true;document.getElementById("mainApp").hidden=false;initApp();}
</script>
</body>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praktikum Tracker</title>
<style>
:root{
  --bg:#0d0a14;--bg-card:#161220;--bg-hover:#1b1626;--bg-el:#211c30;
  --border:#2a2438;--border-s:#221d2e;
  --accent:#9d6fff;--accent2:#c9a8ff;--glow:rgba(157,111,255,.22);
  --text:#ece7f7;--dim:#9a90b3;--faint:#5e5575;
  --danger:#f1666e;
  --s0:#5b5470;--s1:#6c93ff;--s2:#34c9c0;--s3:#f5b94e;--s4:#4fd693;--s5:#f1666e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at 15% -10%,rgba(157,111,255,.10),transparent 45%),
             radial-gradient(circle at 100% 0%,rgba(108,147,255,.06),transparent 40%),var(--bg);
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* ── ONBOARDING ── */
#onboarding{position:fixed;inset:0;background:rgba(7,5,12,.97);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.ob-box{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
  width:100%;max-width:520px;overflow:hidden;}
.ob-header{padding:28px 28px 0;}
.ob-header h1{font-size:22px;font-weight:700;margin-bottom:6px;}
.ob-header p{color:var(--dim);font-size:13.5px;line-height:1.6;}
.ob-steps{display:flex;gap:6px;padding:20px 28px 0;}
.ob-step{height:3px;border-radius:99px;flex:1;background:var(--border);transition:background .3s;}
.ob-step.done{background:var(--accent);}
.ob-body{padding:24px 28px 28px;}
.ob-body h2{font-size:15px;font-weight:650;margin-bottom:14px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.lang-opt{border:1px solid var(--border);background:var(--bg-el);border-radius:10px;
  padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.lang-opt:hover{border-color:var(--accent);}
.lang-opt.sel{background:var(--glow);border-color:var(--accent);color:var(--accent2);}
.lang-opt .flag{font-size:24px;display:block;margin-bottom:6px;}
.lang-opt .lname{font-size:12px;font-weight:600;}
.ob-instruction{background:var(--bg-el);border:1px solid var(--border-s);border-radius:10px;
  padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7;color:var(--dim);}
.ob-instruction b{color:var(--text);}
.ob-instruction a{color:var(--accent2);text-decoration:none;}
.ob-instruction a:hover{text-decoration:underline;}
.ob-key-row{display:flex;gap:8px;margin-bottom:8px;}
.ob-key-row input{flex:1;background:var(--bg-el);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:10px 12px;border-radius:9px;outline:none;font-family:monospace;}
.ob-key-row input:focus{border-color:var(--accent);}
.ob-key-row input::placeholder{font-family:inherit;}
.ob-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;}
.btn-back:hover{color:var(--text);border-color:var(--accent);}
.btn-next{background:var(--accent);border:none;color:#140c24;font-weight:700;
  font-size:13px;padding:9px 20px;border-radius:9px;cursor:pointer;}
.btn-next:hover{filter:brightness(1.08);}
.btn-next:disabled{opacity:.4;cursor:default;}

/* ── MAIN APP ── */
.app{max-width:940px;margin:0 auto;padding:28px 20px 80px;}

/* topbar */
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:38px;height:38px;border-radius:11px;flex:none;
  background:linear-gradient(145deg,var(--accent),#5a3bb8);position:relative;}
.brand-mark::after{content:"";position:absolute;inset:11px;border-radius:4px;background:var(--bg);opacity:.9;}
h1{font-size:20px;font-weight:700;letter-spacing:.2px;}
h1 .dot{color:var(--accent);}
.subtitle{font-size:12px;color:var(--dim);margin-top:2px;}
.topbar-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:12px;padding:8px 11px;border-radius:9px;cursor:pointer;white-space:nowrap;}
.btn-ghost:hover{color:var(--text);border-color:var(--accent);}
.btn-add{background:var(--accent);color:#140c24;border:none;font-weight:700;
  font-size:13px;padding:9px 15px;border-radius:9px;cursor:pointer;white-space:nowrap;}
.btn-add:hover{filter:brightness(1.08);}

/* autosave bar */
.autosave-bar{display:flex;align-items:center;gap:9px;padding:8px 12px;
  background:var(--bg-card);border:1px solid var(--border-s);border-radius:10px;margin-bottom:16px;}
.asdot{width:7px;height:7px;border-radius:50%;flex:none;background:var(--faint);}
.autosave-bar.connected .asdot{background:var(--s4);}
.autosave-bar.needs-permission .asdot{background:var(--s3);}
.autosave-bar.unsupported-brave .asdot{background:var(--s3);}
.astext{font-size:12px;color:var(--dim);flex:1;}
.astext b{color:var(--text);}

/* rate limit bar */
.rl-bar{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:var(--bg-card);border:1px solid var(--border-s);border-radius:10px;margin-bottom:16px;
  flex-wrap:wrap;}
.rl-bar[hidden]{display:none;}
.rl-icon{font-size:14px;flex:none;}
.rl-text{font-size:12px;color:var(--dim);flex:1;}
.rl-text b{color:var(--text);}
.rl-text.warn b{color:var(--s3);}
.rl-text.empty b{color:var(--danger);}

/* progress */
.progress-wrap{margin-bottom:22px;}
.progress-caption{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:7px;}
.progress-caption b{color:var(--text);}
.progress-track{display:flex;height:7px;border-radius:99px;overflow:hidden;
  background:var(--bg-el);border:1px solid var(--border-s);}
.progress-seg{height:100%;transition:width .3s;}

/* filters */
.controls{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;align-items:center;}
.chip{border:1px solid var(--border);background:var(--bg-card);color:var(--dim);
  font-size:12px;padding:6px 11px;border-radius:99px;cursor:pointer;white-space:nowrap;}
.chip:hover{border-color:var(--accent);}
.chip.active{background:var(--glow);border-color:var(--accent);color:var(--accent2);}
.search-input{flex:1;background:var(--bg-card);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:8px 12px;border-radius:9px;outline:none;min-width:140px;}
.search-input:focus{border-color:var(--accent);}

/* cards */
.list{display:flex;flex-direction:column;gap:8px;}
.card{background:var(--bg-card);border:1px solid var(--border-s);
  border-left:3px solid var(--c,var(--s0));border-radius:12px;overflow:hidden;}
.card:hover{background:var(--bg-hover);}
.card-main{display:flex;align-items:center;gap:10px;padding:12px 13px;}
.card-info{flex:1;min-width:0;}
.card-info h3{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.meta-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.status-lbl{font-size:11px;font-weight:700;color:var(--c,var(--s0));letter-spacing:.2px;}
.date-lbl{font-size:11px;color:var(--faint);}
select.status-sel{background:var(--bg-el);border:1px solid var(--border);
  color:var(--text);font-size:12px;padding:7px 8px;border-radius:8px;outline:none;cursor:pointer;max-width:130px;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:12px;padding:7px 9px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.icon-btn:hover{color:var(--text);border-color:var(--accent);}
.icon-btn.del:hover{color:var(--danger);border-color:var(--danger);}

/* card detail */
.card-detail{border-top:1px solid var(--border-s);padding:15px 15px 18px;background:rgba(255,255,255,.012);}
.detail-links{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;}
.detail-links a{color:var(--accent2);text-decoration:none;font-size:12px;
  border:1px solid var(--border);padding:5px 9px;border-radius:7px;background:var(--bg-el);}
.detail-links a:hover{border-color:var(--accent);}
.detail-links .muted{color:var(--faint);font-size:12px;padding:5px 0;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 11px;margin-bottom:9px;}
@media(max-width:540px){.form-grid{grid-template-columns:1fr;}}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:4px;}
.field input,.field textarea{width:100%;background:var(--bg-el);border:1px solid var(--border);
  color:var(--text);font-size:13px;padding:8px 10px;border-radius:8px;outline:none;font-family:inherit;}
.field input:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:52px;}
.detail-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:11px;}
.ai-row{display:flex;align-items:center;gap:9px;margin:10px 0 3px;}
.btn-ai{background:var(--bg-el);border:1px solid var(--accent);color:var(--accent2);
  font-size:12px;font-weight:600;padding:8px 12px;border-radius:9px;cursor:pointer;}
.btn-ai:hover{background:var(--glow);}
.btn-ai:disabled{opacity:.45;cursor:default;}
.ai-status{font-size:12px;min-height:15px;margin:6px 0;}
.ai-status.loading{color:var(--dim);}
.ai-status.ok{color:var(--s4);}
.ai-status.err{color:var(--danger);}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(7,5,12,.72);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:50;overflow-y:auto;}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:540px;padding:22px;}
.modal h2{font-size:16px;margin-bottom:14px;}
.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:14px;}
.btn-prim{background:var(--accent);border:none;color:#140c24;font-weight:700;
  font-size:13px;padding:9px 18px;border-radius:9px;cursor:pointer;}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--dim);
  font-size:13px;padding:9px 14px;border-radius:9px;cursor:pointer;}
.btn-prim:hover{filter:brightness(1.08);}
.btn-sec:hover{color:var(--text);border-color:var(--accent);}

/* settings modal */
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border-s);}
.set-row:last-child{border-bottom:none;}
.set-label{font-size:13px;color:var(--dim);}
.set-label b{color:var(--text);display:block;font-size:12px;margin-bottom:2px;}

/* empty */
.empty{text-align:center;color:var(--faint);padding:55px 20px;font-size:13px;
  border:1px dashed var(--border);border-radius:14px;}

/* lang switcher */
.lang-btn{font-size:11px;font-weight:600;letter-spacing:.5px;}
.lang-btn.active{border-color:var(--accent);color:var(--accent2);}

footer.note{text-align:center;color:var(--faint);font-size:11px;margin-top:32px;line-height:1.6;}

/* priority badges */
.prio-badge{display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:800;
  flex:none;margin-right:2px;}
.prio-A{background:rgba(245,185,78,.18);color:var(--s3);}
.prio-B{background:rgba(108,147,255,.18);color:var(--s1);}
.prio-C{background:rgba(255,255,255,.06);color:var(--faint);}
.npos-badge{display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;color:var(--danger);background:rgba(241,102,110,.12);
  border:1px solid rgba(241,102,110,.25);border-radius:6px;padding:2px 6px;margin-left:4px;}

.chip.prio-chip-A.active{background:rgba(245,185,78,.18);border-color:var(--s3);color:var(--s3);}
.chip.prio-chip-B.active{background:rgba(108,147,255,.18);border-color:var(--s1);color:var(--s1);}
.chip.prio-chip-C.active{background:rgba(255,255,255,.08);border-color:var(--dim);color:var(--dim);}
.chip.prio-chip-none.active{background:rgba(255,255,255,.05);border-color:var(--faint);color:var(--faint);}
.chip.prio-chip-nopos.active{background:rgba(241,102,110,.12);border-color:var(--danger);color:var(--danger);}

[hidden]{display:none!important;}
</style>
</head>
<body>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <div class="ob-box">
    <div class="ob-header">
      <h1>Praktikum<span style="color:var(--accent)">.</span></h1>
      <p id="ob-desc">Ferialpraktikum Tracker · HTL Donaustadt</p>
    </div>
    <div class="ob-steps">
      <div class="ob-step done" id="obs0"></div>
      <div class="ob-step" id="obs1"></div>
      <div class="ob-step" id="obs2"></div>
    </div>
    <div class="ob-body" id="ob-body"></div>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div class="app" id="mainApp" hidden>
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>Praktikum<span class="dot">.</span></h1>
        <p class="subtitle" id="subtitle">HTL Donaustadt</p>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost lang-btn" data-l="de">DE</button>
      <button class="btn-ghost lang-btn" data-l="ru">RU</button>
      <button class="btn-ghost lang-btn" data-l="en">EN</button>
      <button class="btn-ghost" id="btnSettings">⚙</button>
      <button class="btn-ghost" id="btnExport" data-i18n="export">Export</button>
      <button class="btn-ghost" id="btnImport" data-i18n="import">Import</button>
      <input type="file" id="importFile" accept="application/json" hidden>
      <button class="btn-add" id="btnAdd" data-i18n="addCompany">+ Firma</button>
    </div>
  </div>

  <!-- autosave -->
  <div class="autosave-bar" id="autosaveBar">
    <span class="asdot"></span>
    <span class="astext" id="asText"></span>
    <button class="btn-ghost" id="asBtn" hidden></button>
    <button class="btn-ghost" id="asDisBtn" hidden></button>
  </div>

  <!-- rate limit info -->
  <div class="rl-bar" id="rlBar" hidden>
    <span class="rl-icon">⚡</span>
    <span class="rl-text" id="rlText"></span>
  </div>

  <!-- progress -->
  <div class="progress-wrap">
    <div class="progress-caption">
      <span><b id="sentCount">0</b> <span id="ofTotal">von 0</span></span>
      <span id="pctLabel">0%</span>
    </div>
    <div class="progress-track" id="progressTrack"></div>
  </div>

  <!-- filters + search -->
  <div class="controls" id="filterRow"></div>
  <div class="controls" id="priorityRow"></div>
  <div class="controls">
    <input class="search-input" id="searchInput" type="text">
  </div>

  <!-- list -->
  <main class="list" id="cardList"></main>
  <p class="empty" id="emptyState" hidden></p>

  <footer class="note" id="footerNote"></footer>
</div>

<!-- ADD modal -->
<div class="modal-overlay" id="addModal" hidden>
  <div class="modal">
    <h2 id="addModalTitle"></h2>
    <div class="form-grid">
      <div class="field" style="grid-column:1/-1"><label id="lblCompanyName"></label><input type="text" id="fName"></div>
      <div class="field"><label id="lbProfession"></label><input type="text" id="fProfession" placeholder="z.B. Elektrotechnik, IT, Mechatronik"></div>
      <div class="field"><label id="lbPriority"></label>
        <select id="fPriority" style="width:100%;background:var(--bg-el);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 10px;border-radius:8px;outline:none;">
          <option value="" id="fPrioNone"></option>
          <option value="A">⭐ A</option>
          <option value="B">🔵 B</option>
          <option value="C">⚪ C</option>
        </select>
      </div>
    </div>
    <div class="ai-row">
      <button class="btn-ai" id="aiFillBtn">✨ <span id="aiFillLabel"></span></button>
    </div>
    <p style="font-size:11px;color:var(--faint);margin:4px 0 12px;" id="aiDisclaimer"></p>
    <div class="ai-status" id="aiStatusNew"></div>
    <div class="form-grid">
      <div class="field"><label id="lbSite"></label><input type="text" id="fWebsite"></div>
      <div class="field"><label id="lbPhone"></label><input type="text" id="fPhone"></div>
      <div class="field"><label id="lbContact"></label><input type="text" id="fContact"></div>
      <div class="field"><label id="lbRole"></label><input type="text" id="fRole"></div>
      <div class="field"><label id="lbEmail"></label><input type="text" id="fEmail"></div>
      <div class="field"><label id="lbAddress"></label><input type="text" id="fAddress"></div>
    </div>
    <div class="field"><label id="lbNotes"></label><textarea id="fNotes"></textarea></div>
    <div class="modal-actions">
      <button class="btn-sec" id="addCancelBtn"></button>
      <button class="btn-prim" id="addSaveBtn"></button>
    </div>
  </div>
</div>

<!-- SETTINGS modal -->
<div class="modal-overlay" id="settingsModal" hidden>
  <div class="modal" style="max-width:440px;">
    <h2 id="settingsTitle"></h2>
    <div class="set-row">
      <div class="set-label"><b id="slApiKey"></b><span id="slApiKeyDesc"></span></div>
      <button class="btn-ghost" id="btnChangeKey" style="font-size:11px;"></button>
    </div>
    <div class="set-row">
      <div class="set-label"><b id="slLang"></b></div>
      <div style="display:flex;gap:6px;">
        <button class="btn-ghost lang-btn" data-l="de" style="font-size:11px;">DE</button>
        <button class="btn-ghost lang-btn" data-l="ru" style="font-size:11px;">RU</button>
        <button class="btn-ghost lang-btn" data-l="en" style="font-size:11px;">EN</button>
      </div>
    </div>
    <div class="set-row">
      <div class="set-label"><b id="slAutosave"></b><span id="slAutosaveDesc"></span></div>
      <button class="btn-ghost" id="asSettingsBtn" style="font-size:11px;"></button>
    </div>
    <div class="modal-actions">
      <button class="btn-prim" id="settingsCloseBtn"></button>
    </div>
  </div>
</div>

<script>

// ═══════════════════════════════════════════

function t(key, vars={}){
  let s = I18N[lang][key] || I18N.en[key] || key;
  Object.entries(vars).forEach(([k,v])=>{ s = s.replace(`{{${k}}}`, v); });
  return s;
}
function T(key, vars={}){ return t(key,vars); }

let obStep = 0;
let obLang = lang;

function needsOnboarding(){ return !groqKey; }

function renderOnboarding(){
  const L = I18N[obLang];
  document.getElementById("ob-desc").textContent = L.ob.desc;
  document.getElementById("ob-body").innerHTML = "";

  // step indicators
  [0,1,2].forEach(i=>{
    const el = document.getElementById("obs"+i);
    el.className = "ob-step" + (i <= obStep ? " done" : "");
  });

  if(obStep === 0){
    document.getElementById("ob-body").innerHTML = `
      <h2>${L.ob.s0title}</h2>
      <div class="lang-grid">
        <div class="lang-opt ${obLang==='de'?'sel':''}" data-ol="de"><span class="flag">🇦🇹</span><span class="lname">Deutsch</span></div>
        <div class="lang-opt ${obLang==='ru'?'sel':''}" data-ol="ru"><span class="flag">🇷🇺</span><span class="lname">Русский</span></div>
        <div class="lang-opt ${obLang==='en'?'sel':''}" data-ol="en"><span class="flag">🇬🇧</span><span class="lname">English</span></div>
      </div>
      <div class="ob-footer">
        <button class="btn-next" id="obNext">${L.ob.next}</button>
      </div>`;
    document.querySelectorAll("[data-ol]").forEach(el=>{
      el.addEventListener("click",()=>{
        obLang = el.dataset.ol;
        renderOnboarding();
      });
    });
    document.getElementById("obNext").addEventListener("click",()=>{ obStep=1; renderOnboarding(); });
  }
  else if(obStep === 1){
    const instrHtml = L.ob.s1instr.map(s=>`<li>${s}</li>`).join("");
    document.getElementById("ob-body").innerHTML = `
      <h2>${L.ob.s1title}</h2>
      <div class="ob-instruction"><ol style="padding-left:18px;line-height:2;">${instrHtml}</ol></div>
      <div class="ob-key-row">
        <input type="text" id="obKeyInput" placeholder="${L.ob.s1keyPh}" autocomplete="off">
      </div>
      <div style="font-size:11px;color:var(--faint);margin-bottom:2px;" id="obKeyErr"></div>
      <div class="ob-footer">
        <button class="btn-back" id="obBack">${L.ob.back}</button>
        <button class="btn-next" id="obNext">${L.ob.next}</button>
      </div>`;
    const inp = document.getElementById("obKeyInput");
    const next = document.getElementById("obNext");
    function checkKey(){
      const v = inp.value.trim();
      next.disabled = v.length < 10;
      document.getElementById("obKeyErr").textContent = "";
    }
    inp.addEventListener("input", checkKey); checkKey();
    document.getElementById("obBack").addEventListener("click",()=>{ obStep=0; renderOnboarding(); });
    document.getElementById("obNext").addEventListener("click",()=>{
      const v = inp.value.trim();
      if(!v || v.length < 10){ document.getElementById("obKeyErr").textContent = "Bitte einen gültigen Schlüssel eingeben."; return; }
      groqKey = v;
      lang = obLang;
      localStorage.setItem(SK_KEY, groqKey);
      localStorage.setItem(SK_LANG, lang);
      obStep = 2; renderOnboarding();
    });
  }
  else {
    const L2 = I18N[obLang];
    document.getElementById("ob-body").innerHTML = `
      <h2>${L2.ob.s2title}</h2>
      <div class="ob-instruction">${L2.ob.s2text}</div>
      <div class="ob-footer">
        <button class="btn-next" id="obDone">${L2.ob.done}</button>
      </div>`;
    document.getElementById("obDone").addEventListener("click",()=>{
      document.getElementById("onboarding").hidden = true;
      document.getElementById("mainApp").hidden = false;
      initApp();
    });
  }
}

// Rate limit helpers
// ═══════════════════════════════════════════
function parseResetTime(val){
  if(!val) return 0;
  if(val.endsWith("ms")) return parseFloat(val);
  if(val.endsWith("s")) return parseFloat(val)*1000;
  return parseFloat(val)*1000;
}
function updateRlFromHeaders(headers){
  const lim = parseInt(headers.get("x-ratelimit-limit-requests")||"0")||0;
  const rem = parseInt(headers.get("x-ratelimit-remaining-requests")||"0")||0;
  const resetRaw = headers.get("x-ratelimit-reset-requests")||"";
  const resetMs = parseResetTime(resetRaw);
  const limTok = parseInt(headers.get("x-ratelimit-limit-tokens")||"0")||0;
  const remTok = parseInt(headers.get("x-ratelimit-remaining-tokens")||"0")||0;
  if(lim || rem){
    rlCache = { lim, rem, resetAt: Date.now()+resetMs, limTok, remTok };
    localStorage.setItem(SK_RL, JSON.stringify(rlCache));
  }
  renderRlBar();
}
function loadRlCache(){
  try{ rlCache = JSON.parse(localStorage.getItem(SK_RL)||"{}"); }catch(e){ rlCache={}; }
}
function resetUtcStr(ms){
  if(!ms) return "?";
  const d = new Date(ms);
  return d.toUTCString().replace("GMT","").trim().slice(-8); // HH:MM:SS
}
function renderRlBar(){
  const bar = document.getElementById("rlBar");
  const txt = document.getElementById("rlText");
  if(!bar || !txt) return;
  const { lim, rem, resetAt } = rlCache;
  if(!lim){ bar.hidden=true; return; }
  bar.hidden = false;
  const reset = resetUtcStr(resetAt);
  if(rem === 0){
    txt.className="rl-text empty";
    txt.innerHTML = T("rlEmpty",{reset});
  } else if(rem <= 3){
    txt.className="rl-text warn";
    txt.innerHTML = T("rlLow",{rem});
  } else {
    txt.className="rl-text";
    txt.innerHTML = T("rlRequests",{rem,lim,reset});
  }
}
function isDayLimitReached(){
  const { rem, lim, resetAt } = rlCache;
  if(!lim) return false;
  if(rem === 0 && resetAt && Date.now() < resetAt) return true;
  return false;
}

// ═══════════════════════════════════════════
// Groq AI
// ═══════════════════════════════════════════
// Optimized: short focused system prompt + explicitly small max_tokens
function buildPrompt(name, profession){
  const profLine = profession ? ` The student is looking for a "${profession}" internship position specifically.` : "";
  return {
    system: `You are a data lookup assistant for an Austrian HTL student seeking Ferialpraktikum.${profLine} Find: website, phone, HR/contact email, contact person name+role for internship applications, Austrian office address. Reply ONLY valid JSON, no markdown, no explanation: {"website":"","phone":"","email":"","contactName":"","contactRole":"","address":"","notes":""}. Empty string if unknown. Never invent.`,
    user: `Company: "${name}", Austria.${profession ? ` Seeking "${profession}" internship contact.` : ""}`
  };
}
async function callGroq(modelId, name, profession, signal){
  const { system, user } = buildPrompt(name, profession);
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+groqKey},
    body: JSON.stringify({
      model: modelId,
      messages:[{role:"system",content:system},{role:"user",content:user}],
      temperature:0.1,
      max_completion_tokens:350
    }),
    signal
  });
  // Always try to read rate limit headers, even on error
  try{ updateRlFromHeaders(res.headers); }catch(e){}
  if(!res.ok){
    const errBody = await res.text().catch(()=>"");
    const err = new Error(errBody.slice(0,200));
    err.status = res.status;
    throw err;
  }
  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || "";
  const m = raw.match(/\{[\s\S]*?\}/);
  if(!m) throw new Error("bad json");
  return JSON.parse(m[0]);
}

function friendlyErr(err){
  const s = err.status, msg = err.message||"";
  if(s===429||msg.includes("429")){
    const reset = resetUtcStr(rlCache.resetAt);
    return T("aiErr429",{reset});
  }
  if(s===401||s===403||msg.includes("401")||msg.includes("403")) return T("aiErrKey");
  if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("network")) return T("aiErrNet");
  if(s===413||msg.includes("413")||msg.includes("request_too_large")) return T("aiErr429",{reset:"?"});
  return T("aiErrGeneric",{msg: msg.slice(0,80)});
}

async function aiFillData(name, profession){
  if(isDayLimitReached()){
    const reset = resetUtcStr(rlCache.resetAt);
    throw Object.assign(new Error("daily limit"),{status:429,resetAt:rlCache.resetAt});
  }
  let lastErr;
  for(const m of AI_MODELS){
    try{
      const result = await callGroq(m.id, name, profession, null);
      return { result, search:m.search };
    }catch(e){
      lastErr = e;
      if(e.status===401||e.status===403) throw e;
      if(e.status===429) throw e;
    }
  }
  throw lastErr;
}

async function runAiFill(statusEl, btn, name, profession, applyFn){
  if(!name.trim()){ setAiStatus(statusEl,"err","—"); return; }
  btn.disabled = true;
  setAiStatus(statusEl,"loading",T("aiLoading"));
  try{
    const { result, search } = await aiFillData(name.trim(), profession||"");
    applyFn(result);
    setAiStatus(statusEl,"ok", search ? T("aiOk") : T("aiOkNoSearch"));
  }catch(e){
    setAiStatus(statusEl,"err", friendlyErr(e));
    renderRlBar();
  }finally{
    btn.disabled = false;
  }
}
function setAiStatus(el, cls, msg){ el.className="ai-status "+cls; el.textContent=msg; }

function loadCompanies(){
  try{ companies = JSON.parse(localStorage.getItem(SK)||"[]"); }
  catch(e){ companies=[]; }
}
function saveCompanies(){
  localStorage.setItem(SK, JSON.stringify(companies));
  writeToFile();
}
function uid(){ return "c"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// File System Access (autosave)
// ═══════════════════════════════════════════
const FS_OK = "showSaveFilePicker" in window;

function openIdb(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(HANDLE_DB,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(HANDLE_STORE);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function idbSet(k,v){ const db=await openIdb(); return new Promise((r,j)=>{ const tx=db.transaction(HANDLE_STORE,"readwrite"); tx.objectStore(HANDLE_STORE).put(v,k); tx.oncomplete=r; tx.onerror=()=>j(tx.error); }); }
async function idbGet(k){ const db=await openIdb(); return new Promise((r,j)=>{ const tx=db.transaction(HANDLE_STORE,"readonly"); const req=tx.objectStore(HANDLE_STORE).get(k); req.onsuccess=()=>r(req.result); req.onerror=()=>j(req.error); }); }
async function idbDel(k){ const db=await openIdb(); return new Promise((r,j)=>{ const tx=db.transaction(HANDLE_STORE,"readwrite"); tx.objectStore(HANDLE_STORE).delete(k); tx.oncomplete=r; tx.onerror=()=>j(tx.error); }); }

async function isBrave(){ try{ return !!(navigator.brave && await navigator.brave.isBrave()); }catch(e){return false;} }

const IN_IFRAME = (() => { try { return window.self !== window.top; } catch(e) { return true; } })();

async function initAutosave(){
  if(IN_IFRAME){ autosaveState="iframe"; renderAsBar(); return; }
  if(!FS_OK){
    autosaveState = (await isBrave()) ? "unsupported-brave" : "unsupported";
    renderAsBar(); return;
  }
  try{
    const h = await idbGet(HANDLE_KEY_IDB);
    if(!h){ autosaveState="disconnected"; renderAsBar(); return; }
    fileHandle = h;
    const p = await fileHandle.queryPermission({mode:"readwrite"});
    autosaveState = p==="granted" ? "connected" : "needs-permission";
  }catch(e){ autosaveState="disconnected"; }
  renderAsBar();
}
function renderAsBar(){
  const bar = document.getElementById("autosaveBar");
  const txt = document.getElementById("asText");
  const btn = document.getElementById("asBtn");
  const dis = document.getElementById("asDisBtn");
  if(!bar) return;
  bar.className = "autosave-bar "+autosaveState;
  const name = fileHandle?.name || "";
  const map = {
    iframe:        [T("asIframe"), "", false, "", false],
    connected:    [T("asConnected",{name}), T("asBtnChange"), true, T("asBtnDisconnect"), true],
    "needs-permission":[T("asNeedsPerm",{name}), T("asBtnPermit"), true, T("asBtnDisconnect"), true],
    disconnected: [T("asDisconnected"), T("asBtnConnect"), true, "", false],
    "unsupported-brave":[T("asBrave"), T("asBraveCopy"), true, "", false],
    unsupported:  [T("asUnsupported"), "", false, "", false],
  };
  const [tx, btnTx, showBtn, disTx, showDis] = map[autosaveState]||map.disconnected;
  txt.innerHTML = tx;
  btn.textContent = btnTx; btn.hidden = !showBtn;
  dis.textContent = disTx; dis.hidden = !showDis;
}
async function connectFile(){
  try{
    const h = await window.showSaveFilePicker({
      suggestedName:"praktikum-data.json",
      types:[{description:"JSON",accept:{"application/json":[".json"]}}]
    });
    fileHandle = h; await idbSet(HANDLE_KEY_IDB,h);
    autosaveState="connected"; renderAsBar(); writeToFile();
  }catch(e){ if(e.name!=="AbortError") console.warn(e); }
}
async function permitFile(){
  if(!fileHandle) return;
  try{
    const p = await fileHandle.requestPermission({mode:"readwrite"});
    if(p==="granted"){ autosaveState="connected"; renderAsBar(); writeToFile(); }
  }catch(e){ console.warn(e); }
}
async function disconnectFile(){
  fileHandle=null; try{ await idbDel(HANDLE_KEY_IDB); }catch(e){}
  autosaveState="disconnected"; renderAsBar();
}
async function writeToFile(){
  if(!fileHandle) return;
  try{
    const p = await fileHandle.queryPermission({mode:"readwrite"});
    if(p!=="granted") return;
    const w = await fileHandle.createWritable();
    await w.write(JSON.stringify(companies,null,2));
    await w.close();
  }catch(e){ console.warn("writeToFile:",e); }
}

function render(){ renderProgress(); renderFilters(); renderList(); applyI18n(); }

function renderProgress(){
  const total = companies.length;
  const sent = companies.filter(c=>c.status!=="not_sent").length;
  document.getElementById("sentCount").textContent = sent;
  document.getElementById("ofTotal").textContent = T("sentOf",{total});
  document.getElementById("pctLabel").textContent = total ? Math.round(sent/total*100)+"%" : "0%";
  const track = document.getElementById("progressTrack");
  track.innerHTML = "";
  STATUSES.forEach((s,i)=>{
    const n = companies.filter(c=>c.status===s).length;
    if(!n) return;
    const seg = document.createElement("div");
    seg.className="progress-seg";
    seg.style.width=(n/total*100)+"%";
    seg.style.background=STATUS_COLORS[i];
    track.appendChild(seg);
  });
}

function renderFilters(){
  const row = document.getElementById("filterRow");
  const statLabels = I18N[lang].statuses;
  let html = `<button class="chip ${activeFilter==='all'?'active':''}" data-f="all">${T("all")} (${companies.length})</button>`;
  STATUSES.forEach((s,i)=>{
    const n = companies.filter(c=>c.status===s).length;
    html += `<button class="chip ${activeFilter===s?'active':''}" data-f="${s}">${statLabels[i]} (${n})</button>`;
  });
  row.innerHTML = html;

  // priority filter row
  const prow = document.getElementById("priorityRow");
  const prioConfig = [
    {v:"A", label:`⭐ A (${companies.filter(c=>c.priority==="A").length})`, cls:"prio-chip-A"},
    {v:"B", label:`🔵 B (${companies.filter(c=>c.priority==="B").length})`, cls:"prio-chip-B"},
    {v:"C", label:`⚪ C (${companies.filter(c=>c.priority==="C").length})`, cls:"prio-chip-C"},
    {v:"none", label:`${T("prioNoneOpt").replace("—","").trim()} (${companies.filter(c=>!c.priority).length})`, cls:"prio-chip-none"},
    {v:"nopos", label:`🚫 ${T("noPositionShort")} (${companies.filter(c=>c.noPosition).length})`, cls:"prio-chip-nopos"},
  ];
  let phtml = `<span style="font-size:11px;color:var(--faint);padding:6px 2px;">${T("filterPriority")}</span>`;
  prioConfig.forEach(p=>{
    const active = activePriorities.has(p.v);
    phtml += `<button class="chip ${p.cls} ${active?'active':''}" data-pf="${p.v}">${p.label}</button>`;
  });
  prow.innerHTML = phtml;
}

function getFiltered(){
  const PRIO_ORDER = {"A":0,"B":1,"C":2,"":3};
  let list = companies.filter(c=>{
    if(activeFilter!=="all" && c.status!==activeFilter) return false;
    if(searchTerm && !c.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    if(activePriorities.size > 0){
      const matchA = activePriorities.has("A") && c.priority==="A";
      const matchB = activePriorities.has("B") && c.priority==="B";
      const matchC = activePriorities.has("C") && c.priority==="C";
      const matchNone = activePriorities.has("none") && !c.priority;
      const matchNopos = activePriorities.has("nopos") && c.noPosition;
      if(!matchA && !matchB && !matchC && !matchNone && !matchNopos) return false;
    }
    return true;
  });
  // sort by priority A→B→C→none
  list.sort((a,b)=>(PRIO_ORDER[a.priority||""]??3)-(PRIO_ORDER[b.priority||""]??3));
  return list;
}

function renderList(){
  const list = document.getElementById("cardList");
  const empty = document.getElementById("emptyState");
  const filtered = getFiltered();
  if(companies.length===0){ list.innerHTML=""; empty.hidden=false; empty.textContent=T("emptyList"); return; }
  if(filtered.length===0){ list.innerHTML=""; empty.hidden=false; empty.textContent=T("emptyFilter"); return; }
  empty.hidden=true;
  list.innerHTML = filtered.map(c=>cardHtml(c)).join("");
}

function cardHtml(c){
  const si = STATUSES.indexOf(c.status); const si2 = si<0?0:si;
  const color = STATUS_COLORS[si2];
  const statLabels = I18N[lang].statuses;
  const isOpen = expandedId===c.id;
  const opts = STATUSES.map((s,i)=>`<option value="${s}" ${s===c.status?"selected":""}>${statLabels[i]}</option>`).join("");
  const links = [];
  if(c.website) links.push(`<a href="${esc(c.website.startsWith("http")?c.website:"https://"+c.website)}" target="_blank" rel="noopener">🌐 ${T("website")}</a>`);
  if(c.phone) links.push(`<a href="tel:${esc(c.phone.replace(/\s/g,""))}">📞 ${esc(c.phone)}</a>`);
  if(c.email) links.push(`<a href="mailto:${esc(c.email)}">✉️ ${esc(c.email)}</a>`);
  const linksHtml = links.length ? links.join("") : `<span class="muted">${esc(c.address)||"—"}</span>`;

  const prioBadge = c.priority ? `<span class="prio-badge prio-${c.priority}">${c.priority}</span>` : "";
  const noposBadge = c.noPosition ? `<span class="npos-badge">🚫 ${T("noPositionShort")}</span>` : "";
  const profTag = c.profession ? `<span class="date-lbl" style="background:rgba(157,111,255,.12);color:var(--accent2);padding:1px 6px;border-radius:5px;">🎓 ${esc(c.profession)}</span>` : "";

  const prioOpts = [
    `<option value="">${T("prioNoneOpt")}</option>`,
    `<option value="A" ${c.priority==="A"?"selected":""}>⭐ A</option>`,
    `<option value="B" ${c.priority==="B"?"selected":""}>🔵 B</option>`,
    `<option value="C" ${c.priority==="C"?"selected":""}>⚪ C</option>`,
  ].join("");

  return `<article class="card" data-id="${c.id}" style="--c:${color}">
  <div class="card-main">
    ${prioBadge}
    <div class="card-info">
      <h3>${esc(c.name)}${noposBadge}</h3>
      <div class="meta-row">
        <span class="status-lbl">${statLabels[si2]}</span>
        ${c.sentDate?`<span class="date-lbl">· ${fmtDate(c.sentDate)}</span>`:""}
        ${profTag}
        ${c.contactName?`<span class="date-lbl">· ${esc(c.contactName)}</span>`:""}
      </div>
    </div>
    <select class="status-sel" data-action="status">${opts}</select>
    <button class="icon-btn" data-action="toggle">${isOpen?T("collapse"):T("details")}</button>
    <button class="icon-btn del" data-action="del">🗑</button>
  </div>
  ${isOpen?`
  <div class="card-detail">
    <div class="detail-links">${linksHtml}</div>
    <div class="form-grid" style="margin-bottom:12px;">
      <div class="field"><label>${T("profession")}</label><input data-f="profession" value="${esc(c.profession)}" placeholder="${T("professionPh")}"></div>
      <div class="field"><label>${T("priority")}</label>
        <select data-f="priority" style="width:100%;background:var(--bg-el);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 10px;border-radius:8px;outline:none;">${prioOpts}</select>
      </div>
      <div class="field" style="grid-column:1/-1;display:flex;align-items:center;gap:10px;">
        <label style="margin:0;cursor:pointer;display:flex;align-items:center;gap:8px;">
          <input type="checkbox" data-f="noPosition" ${c.noPosition?"checked":""} style="width:16px;height:16px;accent-color:var(--danger);">
          <span style="font-size:12px;color:var(--dim);">🚫 ${T("noPosition")}</span>
        </label>
      </div>
    </div>
    <div class="ai-row">
      <button class="btn-ai" data-action="ai">✨ ${T("aiFill")}</button>
    </div>
    <div class="ai-status" data-role="ais"></div>
    <div class="form-grid">
      <div class="field"><label>${T("website")}</label><input data-f="website" value="${esc(c.website)}"></div>
      <div class="field"><label>${T("phone")}</label><input data-f="phone" value="${esc(c.phone)}"></div>
      <div class="field"><label>${T("contact")}</label><input data-f="contactName" value="${esc(c.contactName)}"></div>
      <div class="field"><label>${T("role")}</label><input data-f="contactRole" value="${esc(c.contactRole)}"></div>
      <div class="field"><label>${T("email")}</label><input data-f="email" value="${esc(c.email)}"></div>
      <div class="field"><label>${T("address")}</label><input data-f="address" value="${esc(c.address)}"></div>
      <div class="field"><label>${T("sentDate")}</label><input type="date" data-f="sentDate" value="${c.sentDate||""}"></div>
    </div>
    <div class="field"><label>${T("notes")}</label><textarea data-f="notes">${esc(c.notes)}</textarea></div>
    <div class="detail-actions">
      <button class="btn-prim" data-action="save">${T("saveChanges")}</button>
    </div>
  </div>`:``}
</article>`;
}

// ═══════════════════════════════════════════
// Mutations
// ═══════════════════════════════════════════
function addCompany(d){
  companies.unshift({id:uid(),name:d.name,status:"not_sent",sentDate:"",
    profession:d.profession||"",
    priority:d.priority||"",
    noPosition:false,
    website:d.website||"",phone:d.phone||"",contactName:d.contactName||"",
    contactRole:d.contactRole||"",email:d.email||"",address:d.address||"",notes:d.notes||""});
  saveCompanies(); render();
}
function delCompany(id){
  if(!confirm(T("deleteConfirm"))) return;
  companies = companies.filter(c=>c.id!==id);
  if(expandedId===id) expandedId=null;
  saveCompanies(); render();
}
function setStatus(id,status){
  const c=companies.find(c=>c.id===id); if(!c) return;
  c.status=status;
  if(status!=="not_sent"&&!c.sentDate) c.sentDate=today();
  saveCompanies(); render();
}
function saveDetail(id,card){
  const c=companies.find(c=>c.id===id); if(!c) return;
  card.querySelectorAll("[data-f]").forEach(el=>{ c[el.dataset.f]=el.value.trim(); });
  saveCompanies(); render();
}

// Modal (add)
// ═══════════════════════════════════════════
const addModal = document.getElementById("addModal");
const MODAL_FIELDS = ["fName","fProfession","fWebsite","fPhone","fContact","fRole","fEmail","fAddress","fNotes"];
function modalHasData(){ return MODAL_FIELDS.some(id=>{ const el=document.getElementById(id); return el&&el.value.trim(); }); }
function openAddModal(){
  MODAL_FIELDS.forEach(id=>{ const el=document.getElementById(id); if(el) el.value=""; });
  document.getElementById("fPriority").value="";
  document.getElementById("aiStatusNew").textContent="";
  document.getElementById("aiStatusNew").className="ai-status";
  addModal.hidden=false;
  document.getElementById("fName").focus();
}
function closeAddModal(){ addModal.hidden=true; }
function closeAddModalConfirm(){
  if(modalHasData()){ if(confirm(T("cancelConfirm"))) closeAddModal(); }
  else closeAddModal();
}

// ═══════════════════════════════════════════
// Event wiring
// ═══════════════════════════════════════════
function wireEvents(){
  document.getElementById("btnAdd").addEventListener("click", openAddModal);
  document.getElementById("addCancelBtn").addEventListener("click", closeAddModalConfirm);
  // clicking overlay does NOT close (intentional — prevents accidental data loss)

  document.getElementById("addSaveBtn").addEventListener("click",()=>{
    const name = document.getElementById("fName").value.trim();
    if(!name){ document.getElementById("fName").focus(); return; }
    addCompany({
      name,
      profession:document.getElementById("fProfession").value.trim(),
      priority:document.getElementById("fPriority").value,
      website:document.getElementById("fWebsite").value.trim(),
      phone:document.getElementById("fPhone").value.trim(),
      contactName:document.getElementById("fContact").value.trim(),
      contactRole:document.getElementById("fRole").value.trim(),
      email:document.getElementById("fEmail").value.trim(),
      address:document.getElementById("fAddress").value.trim(),
      notes:document.getElementById("fNotes").value.trim(),
    });
    closeAddModal();
  });

  document.getElementById("aiFillBtn").addEventListener("click",()=>{
    const name = document.getElementById("fName").value;
    const profession = document.getElementById("fProfession").value.trim();
    runAiFill(
      document.getElementById("aiStatusNew"),
      document.getElementById("aiFillBtn"),
      name, profession,
      r=>{
        document.getElementById("fWebsite").value=r.website||"";
        document.getElementById("fPhone").value=r.phone||"";
        document.getElementById("fContact").value=r.contactName||"";
        document.getElementById("fRole").value=r.contactRole||"";
        document.getElementById("fEmail").value=r.email||"";
        document.getElementById("fAddress").value=r.address||"";
        document.getElementById("fNotes").value=r.notes||"";
      }
    );
  });

  // card list delegation
  document.getElementById("cardList").addEventListener("click",e=>{
    const card = e.target.closest(".card"); if(!card) return;
    const id = card.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    if(!action) return;
    if(action==="toggle"){ expandedId = expandedId===id?null:id; render(); }
    else if(action==="del"){ delCompany(id); }
    else if(action==="save"){ saveDetail(id,card); }
    else if(action==="ai"){
      const c=companies.find(c=>c.id===id); if(!c) return;
      const ais=card.querySelector("[data-role='ais']");
      const btn=e.target.closest("[data-action='ai']");
      runAiFill(ais,btn,c.name,r=>{
        card.querySelector("[data-f='website']").value=r.website||"";
        card.querySelector("[data-f='phone']").value=r.phone||"";
        card.querySelector("[data-f='contactName']").value=r.contactName||"";
        card.querySelector("[data-f='contactRole']").value=r.contactRole||"";
        card.querySelector("[data-f='email']").value=r.email||"";
        card.querySelector("[data-f='address']").value=r.address||"";
        card.querySelector("[data-f='notes']").value=r.notes||"";
      });
    }
  });
  document.getElementById("cardList").addEventListener("change",e=>{
    if(e.target.dataset.action==="status"){
      setStatus(e.target.closest(".card").dataset.id, e.target.value);
    }
  });

  // filters + search
  document.getElementById("filterRow").addEventListener("click",e=>{
    const b=e.target.closest("[data-f]"); if(!b) return;
    activeFilter=b.dataset.f; render();
  });
  document.getElementById("searchInput").addEventListener("input",e=>{
    searchTerm=e.target.value; renderList();
  });

  // export / import
  document.getElementById("btnExport").addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify(companies,null,2)],{type:"application/json"});
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(blob),download:T("exportFilename")});
    a.click(); URL.revokeObjectURL(a.href);
  });
  document.getElementById("btnImport").addEventListener("click",()=>document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const arr=JSON.parse(r.result);
        if(!Array.isArray(arr)) throw new Error("invalid format");
        if(confirm(T("importConfirm",{n:arr.length}))){
          companies=[...companies,...arr]; saveCompanies(); render();
        }
      }catch(err){ alert(T("importErr",{msg:err.message})); }
    };
    r.readAsText(f); e.target.value="";
  });

  // lang buttons
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      lang=b.dataset.l; localStorage.setItem(SK_LANG,lang); render();
    });
  });

  // autosave bar buttons
  document.getElementById("asBtn").addEventListener("click",async()=>{
    if(autosaveState==="needs-permission") await permitFile();
    else if(autosaveState==="unsupported-brave"){
      try{ await navigator.clipboard.writeText("brave://flags/#file-system-access-api"); }catch(e){}
      document.getElementById("asText").textContent=T("asBraveCopied");
    }
    else await connectFile();
  });
  document.getElementById("asDisBtn").addEventListener("click",()=>{
    if(confirm(T("cancelConfirm"))) disconnectFile();
  });

  // settings modal
  document.getElementById("btnSettings").addEventListener("click",()=>{
    applyI18n();
    document.getElementById("settingsModal").hidden=false;
  });
  document.getElementById("settingsCloseBtn").addEventListener("click",()=>{
    document.getElementById("settingsModal").hidden=false;
    document.getElementById("settingsModal").hidden=true;
  });
  document.getElementById("settingsModal").addEventListener("click",e=>{
    if(e.target===document.getElementById("settingsModal")) document.getElementById("settingsModal").hidden=true;
  });
  document.getElementById("btnChangeKey").addEventListener("click",()=>{
    const newKey=prompt(T("newKeyPrompt"), groqKey);
    if(newKey && newKey.trim().length>5){
      groqKey=newKey.trim(); localStorage.setItem(SK_KEY,groqKey);
    }
  });
  document.getElementById("asSettingsBtn").addEventListener("click",async()=>{
    if(autosaveState==="connected") await connectFile();
    else if(autosaveState==="needs-permission") await permitFile();
    else await connectFile();
    applyI18n();
  });
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
function initApp(){
  loadCompanies();
  loadRlCache();
  render();
  initAutosave();
  wireEvents();
}

// Start
if(needsOnboarding()){
  renderOnboarding();
} else {
  document.getElementById("onboarding").hidden=true;
  document.getElementById("mainApp").hidden=false;
  initApp();
}
</script>
</body>
